name: Bug report
description: Report a reproducible issue
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Description
      description: What happened and what you expected.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: OS, Python, notebook/runtime details.
